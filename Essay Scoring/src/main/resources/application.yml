server:
  port: 8080

# 应用自定义配置
app:
  cors:
    # 允许的前端来源（多个用逗号分隔），生产环境请改为具体域名
    allowed-origins: ${CORS_ORIGINS:http://localhost:8080}

spring:
  application:
    name: essay-scoring-system
  
  # 数据源配置（H2 文件数据库 — 数据持久化到磁盘，重启不丢失）
  datasource:
    url: jdbc:h2:file:./data/essayscoring;MODE=MySQL;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update    # 自动创建/更新表结构
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # H2 控制台（开发调试用）
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # DeepSeek API 配置
  cloud:
    ai:
      deepseek:
        # API Key - 从环境变量 DEEPSEEK_API_KEY 获取
        api-key: ${DEEPSEEK_API_KEY:your-api-key-here}
        # 模型配置
        chat:
          options:
            model: deepseek-chat
            temperature: 0.3
            max-tokens: 2000

# JWT 配置
jwt:
  # JWT 签名密钥（Base64 编码），通过环境变量注入，默认值仅用于本地开发
  secret: ${JWT_SECRET:c29tZS1sb25nLXNlY3JldC1rZXktZm9yLWVzc2F5LXNjb3Jpbmc=}
  expiration-ms: 86400000   # 24 小时

# 日志配置
logging:
  level:
    root: INFO
    com.study.ai.essayscoring: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
